---
- name: Define number of BMH's
  set_fact:
    NUMBER_OF_BMH: "{{ CONTROL_PLANE_MACHINE_COUNT|int +  WORKER_MACHINE_COUNT|int }}"
    general_containers:
    - httpd-infra
    - registry
    - sushy-tools
    - vbmc

- name: Fetch container logs (kind cluster)
  block:

  - name: Create directories for storing container logs (kind cluster)
    file:
      path: "/tmp/{{ CONTAINER_RUNTIME }}/{{ item }}"
      state: directory
    with_items:
    - "{{ general_containers }}"

  - name: Fetch container logs before pivoting (kind cluster)
    shell: "sudo {{ CONTAINER_RUNTIME }} logs {{ item }} > /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stdout.log 2> /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stderr.log"
    with_items:
    - "{{ general_containers }}"

  when: BOOTSTRAP_CLUSTER == "kind"
  become: yes
  become_user: root

- name: Remove Ironic CR from source cluster (kind cluster)
  kubernetes.core.k8s:
    api_version: ironic.metal3.io/v1alpha1
    kind: Ironic
    name: ironic
    namespace: "{{ IRONIC_NAMESPACE }}"
    kubeconfig: "{{ KUBECONFIG_PATH }}"
    state: absent
  when: BOOTSTRAP_CLUSTER == "kind" and USE_IRSO | bool

- name: Label baremetalhost CRD to pivot.
  shell: "kubectl label --overwrite crds baremetalhosts.metal3.io {{ item }}"
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""
  - clusterctl.cluster.x-k8s.io/move-hierarchy=""

- name: Label hardwareData CRD to pivot.
  shell: "kubectl label --overwrite crds hardwaredata.metal3.io {{ item }}"
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""

- name: Obtain target cluster kubeconfig
  kubernetes.core.k8s_info:
    kind: secrets
    name: "{{ CLUSTER_NAME }}-kubeconfig"
    namespace: "{{ NAMESPACE }}"
  register: metal3_kubeconfig

- name: Decode and save cluster kubeconfig
  copy:
    content: "{{ metal3_kubeconfig.resources[0].data.value | b64decode }}"
    dest: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

- name: Create namespace
  kubernetes.core.k8s:
    name: "{{ NAMESPACE }}"
    kind: Namespace
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

- name: Initialize Provider component in target cluster
  vars:
    ipam_release: "{{ lookup('env', 'IPAMRELEASE') }}"
  shell: "clusterctl init --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml --core cluster-api:{{ CAPIRELEASE }} --bootstrap kubeadm:{{ CAPIRELEASE }} --control-plane kubeadm:{{ CAPIRELEASE }} --infrastructure metal3:{{ CAPM3RELEASE }} -v 5 --ipam metal3:{{ IPAMRELEASE }}"

# Check for cert-manager pods on the target cluster
- name: Check if cert-manager  pods in running state
  kubernetes.core.k8s_info:
    kind: pods
    namespace: cert-manager
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    field_selectors:
    - status.phase!=Running
  register: target_running_pods
  retries: 20
  delay: 20
  until: (target_running_pods is succeeded) and (target_running_pods.resources | length == 0)

# Install BMO
- name: Install Baremetal Operator
  shell: "{{ BMOPATH }}/tools/deploy.sh -b {{ BMO_IRONIC_ARGS }}"
  environment:
    IRONIC_HOST: "{{ IRONIC_HOST }}"
    IRONIC_HOST_IP: "{{ IRONIC_HOST_IP }}"
    KUBECTL_ARGS: "{{ KUBECTL_ARGS }}"
  args:
    chdir: "{{ BMOPATH }}"

# Install Ironic via IRSO on target cluster
- name: Install IRSO operator in target cluster
  shell: "make -C {{ IRSOPATH }} install deploy IMG={{ IRSO_IMAGE }}"
  environment:
    KUBECONFIG: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
  when: USE_IRSO | bool

- name: Wait for IRSO operator to be available in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml wait --for=condition=Available --timeout=60s -n ironic-standalone-operator-system deployment/ironic-standalone-operator-controller-manager"
  when: USE_IRSO | bool

- name: Delete ironic-auth secret if it exists in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml delete secret ironic-auth -n {{ IRONIC_NAMESPACE }} --ignore-not-found"
  when: USE_IRSO | bool

- name: Create ironic-auth secret in target cluster
  shell: >
    kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml create secret generic ironic-auth
    -n {{ IRONIC_NAMESPACE }}
    --from-file=username={{ IRONIC_DATA_DIR }}/auth/ironic-username
    --from-file=password={{ IRONIC_DATA_DIR }}/auth/ironic-password
  when: USE_IRSO | bool

- name: Label ironic-auth secret in target cluster
  shell: >
    kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label secret ironic-auth -n {{ IRONIC_NAMESPACE }} environment.metal3.io/ironic-standalone-operator=true
  when: USE_IRSO | bool

- name: Delete ironic-cert secret if it exists in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml delete secret ironic-cert -n {{ IRONIC_NAMESPACE }} --ignore-not-found"
  when: USE_IRSO | bool and IRONIC_TLS_SETUP == "true"

- name: Create ironic-cert TLS secret in target cluster
  shell: >
    kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml create secret tls ironic-cert
    -n {{ IRONIC_NAMESPACE }}
    --key={{ WORKING_DIR }}/certs/ironic.key
    --cert={{ WORKING_DIR }}/certs/ironic.crt
  when: USE_IRSO | bool and IRONIC_TLS_SETUP == "true"

- name: Label ironic-cert secret in target cluster
  shell: >
    kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label secret ironic-cert -n {{ IRONIC_NAMESPACE }} environment.metal3.io/ironic-standalone-operator=true
  when: USE_IRSO | bool and IRONIC_TLS_SETUP == "true"

- name: Delete ironic-cacert secret if it exists in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml delete secret ironic-cacert -n {{ IRONIC_NAMESPACE }} --ignore-not-found"
  when: USE_IRSO | bool and IRONIC_TLS_SETUP == "true"

- name: Create ironic-cacert TLS secret in target cluster
  shell: >
    kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml create secret tls ironic-cacert
    -n {{ IRONIC_NAMESPACE }}
    --key={{ WORKING_DIR }}/certs/ironic-ca.key
    --cert={{ WORKING_DIR }}/certs/ironic-ca.pem
  when: USE_IRSO | bool and IRONIC_TLS_SETUP == "true"

- name: Install Ironic CR in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml create -f {{ IRONIC_DATA_DIR }}/ironic.yaml"
  when: USE_IRSO | bool

- name: Wait for Ironic to be ready in target cluster
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml wait --for=condition=Ready --timeout=300s -n {{ IRONIC_NAMESPACE }} ironic/ironic"
  when: USE_IRSO | bool

- name: Label baremetalhost CRD in target cluster to pivot back.
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label crds baremetalhosts.metal3.io {{ item }} --overwrite "
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""
  - clusterctl.cluster.x-k8s.io/move-hierarchy=""

- name: Label hardwareData CRD in target cluster to pivot back.
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label crds hardwaredata.metal3.io {{ item }} --overwrite "
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""

# Check for pods & nodes on the target cluster
- name: Check if pods in running state
  kubernetes.core.k8s_info:
    kind: pods
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    field_selectors:
    - status.phase!=Running
  register: target_running_pods
  retries: 150
  delay: 20
  until: (target_running_pods is succeeded) and (target_running_pods.resources | length == 0)

- name: Check if all deployments replicas are available
  kubernetes.core.k8s_info:
    kind: Deployment
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
  register: deployments
  retries: 150
  delay: 20
  until: (deployments is succeeded) and (deployments.resources | filter_unavailable_replicas | length == 0 )

- name: Pivot objects to target cluster
  shell: "clusterctl move --to-kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml -n {{ NAMESPACE }} -v 10"

- name: Remove BMO deployment from source cluster
  kubernetes.core.k8s:
    name: "{{ NAMEPREFIX }}-controller-manager"
    kind: Deployment
    state: absent
    namespace: "{{ IRONIC_NAMESPACE }}"

- name: Verify that all machines are provisioned and running.
  include_tasks: verify_resources_states.yml
  vars:
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

# Normally as non authenticated user we should
# fail here(get 401) to reach Ironic.
- name: Expect 401 from /v1/nodes ednpoint
  uri:
    url: "{{ IRONIC_URL }}nodes"
    return_content: no
    validate_certs: no
    method: GET
    status_code: [ 401 ]
